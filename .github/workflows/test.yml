name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.1
      - run: uv run pytest -q
      - run: uv run --group lint ruff check .
      - run: uv run --group lint ruff format --check .
      - run: uv run --group lint ty check
